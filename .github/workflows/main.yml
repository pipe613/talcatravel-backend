name: Flujo CI/CD TalcaTravel Tech

# Se ejecuta automáticamente al hacer push a la rama main
on:
  push:
    branches: [ "main" ]

jobs:
  # ==========================================
  # FASE 1: INTEGRACIÓN CONTINUA (CI)
  # ==========================================
  build-and-verify:
    name: Construcción y Pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Verificar construcción de Docker
        # Construye la imagen para confirmar que el Dockerfile y requirements.txt están sanos
        run: docker build -t talcatravel-test .

  # ==========================================
  # FASE 2: DESPLIEGUE CONTINUO (CD) EN AWS
  # ==========================================
  deploy:
    name: Despliegue en Servidor AWS EC2
    needs: build-and-verify # Solo se ejecuta si la fase 1 es exitosa
    runs-on: ubuntu-latest
    steps:
      - name: Conectar por SSH y actualizar contenedor
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          # Los comandos que se ejecutarán remotamente en tu servidor AWS
          script: |
            cd /home/ubuntu/talcatravel-backend
            git pull origin main
            docker compose up -d --build