apiVersion: apps/v1
kind: Deployment
metadata:
  name: talcatravel-backend
  labels:
    app: django-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-api
  template:
    metadata:
      labels:
        app: django-api
    spec:
      containers:
      - name: web
        image: elifokami/talcatravel-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DEBUG
          value: "False"
        - name: DB_NAME
          value: "neondb"
        - name: DB_USER
          value: "neondb_owner"
        - name: DB_PASSWORD
          value: "npg_OY2yspEJkw6T"
        - name: DB_HOST
          value: "ep-rough-shape-aphist16.c-7.us-east-1.aws.neon.tech"
        - name: DB_PORT
          value: "5432"