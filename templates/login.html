<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - TalcaTravel Tech</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 font-sans h-screen flex items-center justify-center relative overflow-hidden">
    
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
    </div>

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md z-10 border border-slate-100 transform transition-all">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-50 rounded-full mb-4 shadow-inner">
                <i class="fa-solid fa-map-location-dot text-blue-600 text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-slate-800 tracking-wide">TalcaTravel Tech</h2>
            <p class="text-sm text-slate-500 mt-1">Ingresa tus credenciales para acceder</p>
        </div>

        <form method="post" class="space-y-5">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm font-medium flex items-center space-x-2 border border-red-100 animate-pulse">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span>Usuario o contraseña incorrectos.</span>
            </div>
            {% endif %}

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Usuario Gestor</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-user text-slate-400"></i>
                    </div>
                    <input type="text" name="username" class="w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm transition-all" placeholder="Ej. admin_tours" required autofocus>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-1">Contraseña de Acceso</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" name="password" class="w-full pl-10 pr-3 py-2.5 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm transition-all" placeholder="••••••••" required>
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors flex items-center justify-center space-x-2">
                    <span>Ingresar al Sistema</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </div>
        </form>
        
        <div class="mt-6 text-center border-t border-slate-100 pt-4">
            <p class="text-xs text-slate-400 font-medium"><i class="fa-solid fa-shield-halved mr-1"></i> Acceso seguro y cifrado.</p>
        </div>
    </div>
</body>
</html>
